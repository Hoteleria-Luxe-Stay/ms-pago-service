openapi: 3.0.3
info:
  title: Pago Service API
  description: |
    Microservicio de pagos. Integra Stripe Checkout (modo PAYMENT) y publica
    eventos a Kafka topic `pago.events` que ms-reserva consume para confirmar
    o liberar reservas (SAGA — Ronda 5.3).
  version: 1.0.0
  contact:
    name: Equipo Pago

servers:
  - url: http://localhost:8085/api/v1
    description: Local development
  - url: http://pago-service:8085/api/v1
    description: Docker internal

tags:
  - name: pagos
    description: Gestion de pagos
  - name: webhook
    description: Webhook de Stripe (publico, validado por firma HMAC)

paths:
  /pagos:
    post:
      tags: [pagos]
      summary: Crear pago (Stripe Checkout Session)
      operationId: crearPago
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrearPagoRequest'
      responses:
        '201':
          description: Pago creado, devuelve checkout URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrearPagoResponse'
        '400':
          description: Validacion fallida
        '502':
          description: Error comunicandose con Stripe

  /pagos/{id}:
    get:
      tags: [pagos]
      summary: Obtener pago por ID
      operationId: obtenerPago
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Pago encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagoResponse'
        '404':
          description: No encontrado

  /pagos/webhook/stripe:
    post:
      tags: [webhook]
      summary: Webhook de Stripe (PUBLICO + verificacion HMAC)
      operationId: stripeWebhook
      parameters:
        - name: Stripe-Signature
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: string
              description: Body crudo del evento Stripe (NO parsear como JSON antes de la verificacion)
      responses:
        '200':
          description: Evento procesado
        '400':
          description: Firma invalida

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    CrearPagoRequest:
      type: object
      required: [reservaId, monto]
      properties:
        reservaId: { type: integer, format: int64 }
        monto: { type: number, format: double, minimum: 0.01 }
        moneda:
          type: string
          pattern: '^[A-Z]{3}$'
          default: USD
        descripcion: { type: string, maxLength: 255 }
        successUrl: { type: string, maxLength: 1000 }
        cancelUrl: { type: string, maxLength: 1000 }

    CrearPagoResponse:
      type: object
      properties:
        pagoId: { type: integer, format: int64 }
        checkoutUrl: { type: string }
        gatewayPaymentId: { type: string }

    PagoResponse:
      type: object
      properties:
        id: { type: integer, format: int64 }
        reservaId: { type: integer, format: int64 }
        monto: { type: number, format: double }
        moneda: { type: string }
        gateway: { type: string }
        estado:
          type: string
          enum: [PENDING, APPROVED, REJECTED]
        gatewayPaymentId: { type: string }
        checkoutUrl: { type: string }
        errorMessage: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
